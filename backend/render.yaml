services:
  - type: web
    name: zapbot-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: KIWIFY_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_CLIENT_EMAIL
        sync: false
      - key: FCM_PRIVATE_KEY
        sync: false
